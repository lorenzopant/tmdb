name: Schema Drift

on:
  schedule:
    # Every Monday at 14:00 UTC
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  schema-drift:
    runs-on: ubuntu-latest
    env:
      TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup action
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run schema drift tests
        id: drift
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm run test:drift 2>&1 | tee drift-output.txt

      - name: Open or update drift issue
        if: steps.drift.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const output = fs.readFileSync("drift-output.txt", "utf8");
            const tail = output.split("\n").slice(-200).join("\n");
            const title = "TMDB schema drift detected";
            const body = [
              "The scheduled schema-drift check (`pnpm run test:drift`) failed, which means the live TMDB API response and our hand-written types in `packages/tmdb/src/types` disagree.",
              "",
              "The baseline is derived FROM the types (`scripts/gen-type-tree.ts`), so each failure is one of:",
              "- `+ path` — the API returns a field the types don't declare → add it to the corresponding type.",
              "- `- path` — a required type field the API no longer returns → the API renamed/removed it, or the type is wrong.",
              "",
              "Tail of the drift output (exact property paths per endpoint):",
              "",
              "```",
              tail,
              "```",
              "",
              "Fix by updating the types in `packages/tmdb/src/types` to match the API. `pnpm run test:drift` regenerates the type-derived baseline and re-checks — there is no separate bless step.",
            ].join("\n");

            // Paginate: a single page (per_page: 100) misses the existing
            // issue once the repo has >100 open issues, which would spawn a
            // duplicate drift issue on every run.
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: "Schema drift detected again on a scheduled run — issue body updated with the latest diff.",
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: Fail job if drift was detected
        if: steps.drift.outcome == 'failure'
        run: exit 1
