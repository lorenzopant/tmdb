name: Publish to NPM

on:
    workflow_dispatch:
        inputs:
            release_type:
                description: "Version bump type"
                required: true
                type: choice
                default: patch
                options:
                    - patch
                    - minor
                    - major
            is_beta:
                description: "Publish as Beta release?"
                required: true
                type: boolean
                default: true # Impostato a true per sicurezza nei test

# GitHub Actions example
jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write # For git operations
            id-token: write # REQUIRED FOR OIDC
        env:
            TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: main

              # Install pnpm
            - uses: pnpm/action-setup@v4
              with:
                  version: 9.15.9
                  run_install: false

            - uses: actions/setup-node@v5
              with:
                  node-version: "20"
                  registry-url: "https://registry.npmjs.org"
                  cache: pnpm

            # Update npm for OIDC publishing compatibility
            - run: npm install -g npm@11.5.1

            - name: Configure git identity
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

            # Install dependencies with pnpm
            - run: pnpm install --frozen-lockfile

            # Build
            - name: Build
              run: pnpm --filter=@lorenzopant/tmdb run build

            - name: Debug structure
              run: |
                  echo "Current directory: $(pwd)"
                  ls -la
                  ls -la packages/ || echo "No packages/ folder!"

            # Run release
            - name: Run release
              run: |
                  RELEASE_TYPE="${{ github.event.inputs.release_type }}"

                  if [ "${{ github.event.inputs.is_beta }}" == "true" ]; then
                  echo "Starting BETA release with ${RELEASE_TYPE} bump..."
                  pnpm --filter=@lorenzopant/tmdb exec release-it --ci --increment "${RELEASE_TYPE}" --preRelease=beta --npm.tag=beta
                  else
                  echo "Starting PRODUCTION release with ${RELEASE_TYPE} bump..."
                  pnpm --filter=@lorenzopant/tmdb exec release-it --ci --increment "${RELEASE_TYPE}"
                  fi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
