name: Publish to NPM

on:
    workflow_dispatch:
        inputs:
            release_type:
                description: "Version bump type"
                required: true
                type: choice
                default: patch
                options:
                    - patch
                    - minor
                    - major
                    - prepatch
                    - preminor
                    - premajor
    push:
        tags:
            - "v[0-9]*.[0-9]*.[0-9]*"

jobs:
    # Triggered from the GitHub Actions UI — mirrors what `pnpm release:*` does
    # locally: bumps the version, commits to main, and pushes the tag so that
    # the publish_release job below takes over.
    trigger_release:
        if: github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: main

            - uses: pnpm/action-setup@v4
              with:
                  version: 9.15.9
                  run_install: false

            - uses: actions/setup-node@v5
              with:
                  node-version: "20"
                  cache: pnpm

            - name: Configure git identity
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Bump package version
              working-directory: packages/tmdb
              run: |
                  RELEASE_TYPE="${{ github.event.inputs.release_type }}"
                  if echo "$RELEASE_TYPE" | grep -q "^pre"; then
                    npm version "$RELEASE_TYPE" --preid=beta --no-git-tag-version
                  else
                    npm version "$RELEASE_TYPE" --no-git-tag-version
                  fi

            - name: Read bumped version
              id: version
              run: echo "version=$(node -p "require('./packages/tmdb/package.json').version")" >> "$GITHUB_OUTPUT"

            - name: Commit, tag, and push
              run: |
                  TAG="v${{ steps.version.outputs.version }}"
                  git add packages/tmdb/package.json
                  git commit -m "chore: release $TAG"
                  git push origin main
                  git tag "$TAG"
                  git push origin "$TAG"

            - name: Summary
              run: |
                  {
                    echo "## Release triggered"
                    echo
                    echo "- Version: \`${{ steps.version.outputs.version }}\`"
                    echo "- Tag pushed — the **publish_release** job will build and publish to npm."
                  } >> "$GITHUB_STEP_SUMMARY"

    publish_release:
        if: github.event_name == 'push'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        env:
            PACKAGE_NAME: "@lorenzopant/tmdb"
            TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v4
              with:
                  version: 9.15.9
                  run_install: false

            - uses: actions/setup-node@v5
              with:
                  node-version: "20"
                  registry-url: "https://registry.npmjs.org"
                  cache: pnpm

            - name: Update npm for OIDC publishing compatibility
              run: npm install -g npm@11.5.1

            - name: Read package version
              id: version
              run: |
                  VERSION=$(node -p "require('./packages/tmdb/package.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

            - name: Check whether version already exists on npm
              id: npm_check
              run: |
                  if npm view "${PACKAGE_NAME}@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
                    echo "published=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "published=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Install dependencies
              if: steps.npm_check.outputs.published != 'true'
              run: pnpm install --frozen-lockfile

            - name: Build package
              if: steps.npm_check.outputs.published != 'true'
              run: pnpm --filter=@lorenzopant/tmdb run build

            - name: Publish package to npm
              if: steps.npm_check.outputs.published != 'true'
              working-directory: packages/tmdb
              run: |
                  VERSION="${{ steps.version.outputs.version }}"

                  if echo "$VERSION" | grep -q -- "-beta\."; then
                    npm publish --provenance --tag beta --access public
                  else
                    npm publish --provenance --access public
                  fi

            - name: Create GitHub release
              run: |
                  gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1 || \
                  gh release create "${{ steps.version.outputs.tag }}" --generate-notes --title "${{ steps.version.outputs.tag }}"
