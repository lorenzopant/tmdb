name: CI

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

jobs:
    unit-tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup action
              uses: pnpm/action-setup@v2
              with:
                  version: 9.15.9

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install

            - name: Run unit tests
              working-directory: packages/tmdb
              run: pnpm run test:unit

    integration-tests:
        runs-on: ubuntu-latest
        # Secrets are not available on fork PRs — only run when they are accessible
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        env:
            TMDB_BEARER_TOKEN: ${{ secrets.TMDB_BEARER_TOKEN }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup action
              uses: pnpm/action-setup@v2
              with:
                  version: 9.15.9

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Create Env file
              run: |
                  touch .env
                  echo TMDB_BEARER_TOKEN=${{ env.TMDB_BEARER_TOKEN }} >> .env

            - name: Install dependencies
              run: pnpm install

            - name: Run integration tests
              working-directory: packages/tmdb
              run: pnpm run test:integration
